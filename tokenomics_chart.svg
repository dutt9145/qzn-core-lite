  <text x="445" y="80" font-size="12" fill="#333333">PAO Governance Treasury</text>
  <text x="410" y="95" font-size="11" fill="#888888">87,500,000 QZN · PAO quorum required</text>

  <!-- Public Issuance ICO -->
