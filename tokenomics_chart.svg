  <rect x="390" y="212" width="14" height="14" rx="3" fill="#3B6D11"/>
  <text x="410" y="224" font-size="13" font-weight="bold" fill="#085041">15%</text>
  <text x="445" y="224" font-size="12" fill="#333333">Liquidity Provision</text>
  <text x="410" y="239" font-size="11" fill="#888888">37,500,000 QZN · Locked deterministically</text>

  <!-- Ecosystem Expansion -->
  <rect x="390" y="260" width="14" height="14" rx="3" fill="#888780"/>
  <text x="410" y="272" font-size="13" font-weight="bold" fill="#085041">10%</text>
  <text x="445" y="272" font-size="12" fill="#333333">Ecosystem Expansion</text>
  <text x="410" y="287" font-size="11" fill="#888888">25,000,000 QZN · PAO-governed</text>

  <!-- Genesis Burn -->
