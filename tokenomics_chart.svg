  <!-- Bottom note -->
  <line x1="40" y1="400" x2="580" y2="400" stroke="#e0e0e0" stroke-width="1"/>
  <text x="310" y="418" text-anchor="middle" font-size="10" fill="#aaaaaa">All figures reflect stated allocations. Genesis Burn is executed at launch, permanently removing 12.5M QZN before first trade.</text>

