  <path d="M200.00,60.00 A150,150 0 0,1 329.90,285.00 L258.89,244.00 A68,68 0 0,0 200.00,142.00 Z" fill="none" stroke="#ffffff" stroke-width="1.5"/>
  <path d="M329.90,285.00 A150,150 0 0,1 134.92,345.15 L170.50,271.27 A68,68 0 0,0 258.89,244.00 Z" fill="none" stroke="#ffffff" stroke-width="1.5"/>
  <path d="M134.92,345.15 A150,150 0 0,1 53.76,243.38 L133.70,225.13 A68,68 0 0,0 170.50,271.27 Z" fill="none" stroke="#ffffff" stroke-width="1.5"/>
  <path d="M53.76,243.38 A150,150 0 0,1 82.73,116.48 L146.84,167.60 A68,68 0 0,0 133.70,225.13 Z" fill="none" stroke="#ffffff" stroke-width="1.5"/>
  <path d="M82.73,116.48 A150,150 0 0,1 155.79,66.66 L179.96,145.02 A68,68 0 0,0 146.84,167.60 Z" fill="none" stroke="#ffffff" stroke-width="1.5"/>
  <path d="M155.79,66.66 A150,150 0 0,1 200.00,60.00 L200.00,142.00 A68,68 0 0,0 179.96,145.02 Z" fill="none" stroke="#ffffff" stroke-width="1.5"/>

  <!-- Center circle (donut hole) -->
